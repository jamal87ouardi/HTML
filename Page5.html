<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style_page5.css">
</head>
<body>

    

    <div class="d1">
        <h3>Inscription</h3>

        <form>
            <table>
                <tr>
                    <td>  <label>Nom</label> </td>
                    <td> 
                        <input type="text" placeholder="Votre nom">  
                        <label class="req" >Champs requis</label>
                    </td>

                </tr>
                <tr>

                    <td>  <label>Prenom</label> </td>
                    <td>  <input type="text" placeholder="Votre prénom"></td>
                </tr>
                <tr>
                    <td> <label> Sexe</label> </td>
                    <td>
                        <input type="radio" name="groupe_1" value="Homme">
                        <label>Homme</label>

                        <input type="radio" name="groupe_1" value="Femme">
                        <label>Femme</label>

                    </td>


                </tr>
                <tr>
                    <td>  <label>Date de Naissance</label> </td>
                    <td> <input type="date"> </td>

                </tr>
                <tr>
                    <td><label>Niveau d'etudes</label></td>
                    <td>
                        <select name="ne">

                            <option value="Bac">Bac</option>
                            <option value="Bac2">Bac + 2</option>
                            <option value="Bac5">Bac + 5</option>


                        </select>

                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td> <input type="submit"  class="b1" value="Envoyer"></td>
                </tr>
                

            </table>
        </form>

    </div>



    <div class="d2">

        <h3>Informations</h3>
        <form>
            <table>

                <tr>
                    <td>  <label>Nom</label> </td>
                    <td> 
                        <input type="text" placeholder="Votre nom">  
                        <label class="req" >Champs obligatoire</label>
                    </td>
                </tr>
                <tr>
                    <td>  <label>Prenom</label> </td>
                    <td>  <input type="text" placeholder="Votre prénom"></td>
                </tr>
                <tr>
                    <td> <label>Telephone</label> </td>
                    <td> 
                        <input type="tel">
                        <label class="req" >Champs obligatoire</label>
                    </td>

                </tr>
                <tr>
                    <td> <label>Email</label> </td>
                    <td> <input type="email">  </td>
                </tr>
             <tr>
                    <td> <label>Site Web Personnel</label> </td>
                    <td> <input type="url">  </td>
                </tr>
                <tr>
                    <td>  <label>Adresse</label>   </td>
                    <td> <textarea placeholder="votre adresse"></textarea>  </td>
                </tr>

                <tr>
                    <td>  </td>
                    <td> <input type="submit" value="Envoyer" class="b3"> </td>

                </tr>








            </table>
        </form>


    </div>

    <div class="d3">

        <h3>Candidature</h3>

        <form>
            <table>

                    <tr>
                        <td>  <label>Nom</label> </td>
                        <td> 
                            <input type="text" placeholder="Votre nom">  
                            <label class="req" >Champs obligatoire</label>
                        </td>
                    </tr>
                    <tr>
                        <td>  <label>Prenom</label> </td>
                        <td>  <input type="text" placeholder="Votre prénom"></td>
                    </tr>
                    <tr>
                        <td>Language</td>
                        <td>
                            <select name="spec">

                                <option value="java">Java</option>
                                <option value="python">Python</option>
                                <option value="php">PHP</option>


                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Experience</td>
                        <td>
                            <input type="radio" name="g3" value="2ans">
                            <label> 2 ans</label>

                            <input type="radio" name="g3" value="5ans">
                            <label>5 ans</label>
                        </td>

                    </tr>
                    <tr>
                        <td>
                            CV
                        </td>
                        <td>
                            <input type="file" ><br>
                            <label class="req" >Champs obligatoire</label>
                        </td>

                    </tr>

                    <tr>
                        <td>Motivation</td>
                        <td>
                            <textarea placeholder="Exprimez vous"></textarea>
                        </td>
                    </tr>
                    <tr>

                        <td></td>
                        <td><input type="submit" value="Send" class="b4"></td>
                    </tr>


            </table>
        </form>

    </div>
    
</body>
